name: Create single-file PR (workflow_run)

on:
  workflow_run:
    workflows: ["Create single-file PR (Trigger on review comment)"]
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  run-splice-bot:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - id: branch-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.SPLICEBOT_TESTING_APP_ID }}
          private-key: ${{ secrets.SPLICEBOT_TESTING_PRIVATE_KEY }}
          owner: leanprover-community

      - uses: leanprover-community/SpliceBot/.github/actions/splice-wf-run@master
        with:
          source_workflow: ${{ github.event.workflow_run.name }}
          # Optional: push PR branches to a dedicated fork.
          push_to_fork: leanprover-community/SpliceBot-testing-fork
          # Optional fork-mode override; default is "false" when omitted.
          # maintainer_can_modify: "true"
          token: ${{ github.token }}
          # Optional separate token for auth checks.
          # authz_token: ${{ secrets.SPLICE_BOT_AUTHZ_TOKEN }}
          # Optional separate branch push token for fork mode.
          branch_token: ${{ steps.branch-token.outputs.token }}
          label_commands: >-
            [
              {
                "command": "ready",
                "label": "ready-to-merge",
                "min_repo_permission": "write",
              },
              {
                "command": "blocked",
                "label": "blocked",
                "min_repo_permission": "maintain",
                "allowed_teams": ["leanprover-community/reviewers"]
              }
            ]
