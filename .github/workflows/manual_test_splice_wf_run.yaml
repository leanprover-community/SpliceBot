name: Synthetic integration test splice-wf-run

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/actions/splice-wf-run/action.yml
      - .github/workflows/manual_test_splice_wf_run.yaml
      - .github/workflows/splice.yaml
  workflow_dispatch:
    inputs:
      action_ref:
        description: Optional ref or SHA to check out for the action under test
        required: false
        default: ''
        type: string
      file_path:
        description: Changed file path to use for synthetic bridge payloads
        required: false
        default: ''
        type: string
      base_ref:
        description: Base branch for synthetic patch application
        required: false
        default: master
        type: string

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  resolve-context:
    runs-on: ubuntu-latest
    outputs:
      tested_ref: ${{ steps.resolve.outputs.tested_ref }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      review_comment_id: ${{ steps.resolve.outputs.review_comment_id }}
      pr_author_login: ${{ steps.resolve.outputs.pr_author_login }}
      file_path: ${{ steps.resolve.outputs.file_path }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      base_repo: ${{ steps.resolve.outputs.base_repo }}
      head_repo: ${{ steps.resolve.outputs.head_repo }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_label: ${{ steps.resolve.outputs.head_label }}
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve synthetic test context
        id: resolve
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          INPUT_ACTION_REF: ${{ inputs.action_ref }}
          INPUT_FILE_PATH: ${{ inputs.file_path }}
          INPUT_BASE_REF: ${{ inputs.base_ref }}
        with:
          script: |
            const inputActionRef = (process.env.INPUT_ACTION_REF || '').trim();
            const inputFilePath = (process.env.INPUT_FILE_PATH || '').trim();
            const inputBaseRef = (process.env.INPUT_BASE_REF || '').trim();
            const repoFull = `${context.repo.owner}/${context.repo.repo}`;

            let testedRef = '';
            let prNumber = '1';
            let reviewCommentId = '1';
            let prAuthorLogin = context.actor;
            let filePath = inputFilePath;
            let baseRef = inputBaseRef || context.payload.repository?.default_branch || 'master';
            let baseRepo = repoFull;
            let headRepo = repoFull;
            let headSha = '';
            let headRef = context.ref.replace(/^refs\/heads\//, '') || 'synthetic-test';
            let headLabel = `${context.repo.owner}:${headRef}`;

            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              testedRef = pr.head.sha;
              prNumber = String(pr.number);
              prAuthorLogin = pr.user.login;
              baseRef = pr.base.ref;
              baseRepo = pr.base.repo.full_name;
              headRepo = pr.head.repo.full_name;
              headSha = pr.head.sha;
              headRef = pr.head.ref;
              headLabel = pr.head.label || `${pr.head.repo.owner.login}:${pr.head.ref}`;

              if (!filePath) {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 100,
                });
                const candidate = files.find((file) => file.status !== 'removed') || files[0];
                filePath = candidate?.filename || '';
              }
            } else {
              testedRef = inputActionRef || process.env.GITHUB_SHA;
              const { data: commit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: testedRef,
              });
              headSha = commit.sha;
              headRef = inputActionRef || context.ref.replace(/^refs\/heads\//, '') || headSha;
              headLabel = `${context.repo.owner}:${headRef}`;
            }

            if (!filePath) {
              core.setFailed(
                'Unable to determine a changed file path. For workflow_dispatch, provide file_path explicitly.'
              );
              return;
            }

            const matrix = [
              {
                name: 'pr-author-success',
                expected_outcome: 'success',
                allow_pr_author: 'true',
                min_repo_permission: 'write',
                allowed_users: '',
                push_to_fork: '',
                commenter_login: prAuthorLogin,
              },
              {
                name: 'allowed-user-success',
                expected_outcome: 'success',
                allow_pr_author: 'false',
                min_repo_permission: 'write',
                allowed_users: 'trusted-reviewer',
                push_to_fork: '',
                commenter_login: 'trusted-reviewer',
              },
              {
                name: 'invalid-min-permission-fails',
                expected_outcome: 'failure',
                allow_pr_author: 'true',
                min_repo_permission: 'bogus',
                allowed_users: '',
                push_to_fork: '',
                commenter_login: prAuthorLogin,
              },
              {
                name: 'invalid-push-to-fork-fails',
                expected_outcome: 'failure',
                allow_pr_author: 'true',
                min_repo_permission: 'write',
                allowed_users: '',
                push_to_fork: 'not-owner-repo',
                commenter_login: prAuthorLogin,
              },
              {
                name: 'unauthorized-commenter-fails',
                expected_outcome: 'failure',
                allow_pr_author: 'false',
                min_repo_permission: 'write',
                allowed_users: '',
                push_to_fork: '',
                commenter_login: `synthetic-denied-${context.runId}`,
              },
            ];

            core.setOutput('tested_ref', testedRef);
            core.setOutput('pr_number', prNumber);
            core.setOutput('review_comment_id', reviewCommentId);
            core.setOutput('pr_author_login', prAuthorLogin);
            core.setOutput('file_path', filePath);
            core.setOutput('base_ref', baseRef);
            core.setOutput('base_repo', baseRepo);
            core.setOutput('head_repo', headRepo);
            core.setOutput('head_sha', headSha);
            core.setOutput('head_ref', headRef);
            core.setOutput('head_label', headLabel);
            core.setOutput('matrix', JSON.stringify(matrix));

  run-synthetic-cases:
    needs: resolve-context
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case: ${{ fromJson(needs.resolve-context.outputs.matrix) }}
    steps:
      - name: Check out action under test
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-context.outputs.tested_ref }}
          fetch-depth: 0

      - name: Build bridge outputs payload
        shell: bash
        env:
          BASE_REF: ${{ needs.resolve-context.outputs.base_ref }}
          PR_AUTHOR_LOGIN: ${{ needs.resolve-context.outputs.pr_author_login }}
        run: |
          set -euo pipefail

          jq -n \
            --arg base_ref "${BASE_REF}" \
            --arg committer "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>" \
            --arg author "${PR_AUTHOR_LOGIN} <${PR_AUTHOR_LOGIN}@users.noreply.github.com>" \
            '{
              base_ref: $base_ref,
              committer: $committer,
              author: $author
            }' > bridge-outputs.json

      - name: Build synthetic bridge metadata
        id: meta
        shell: bash
        env:
          PR_NUMBER: ${{ needs.resolve-context.outputs.pr_number }}
          REVIEW_COMMENT_ID: ${{ needs.resolve-context.outputs.review_comment_id }}
          FILE_PATH: ${{ needs.resolve-context.outputs.file_path }}
          COMMENTER_LOGIN: ${{ matrix.case.commenter_login }}
          PR_AUTHOR_LOGIN: ${{ needs.resolve-context.outputs.pr_author_login }}
          BASE_REPO: ${{ needs.resolve-context.outputs.base_repo }}
          HEAD_REPO: ${{ needs.resolve-context.outputs.head_repo }}
          HEAD_SHA: ${{ needs.resolve-context.outputs.head_sha }}
          HEAD_REF: ${{ needs.resolve-context.outputs.head_ref }}
          HEAD_LABEL: ${{ needs.resolve-context.outputs.head_label }}
        run: |
          set -euo pipefail

          meta_json="$(jq -cn \
            --argjson pr_number "${PR_NUMBER}" \
            --argjson review_comment_id "${REVIEW_COMMENT_ID}" \
            --arg file_path "${FILE_PATH}" \
            --arg commenter_login "${COMMENTER_LOGIN}" \
            --arg pr_author_login "${PR_AUTHOR_LOGIN}" \
            --arg base_repo "${BASE_REPO}" \
            --arg head_repo "${HEAD_REPO}" \
            --arg head_sha "${HEAD_SHA}" \
            --arg head_ref "${HEAD_REF}" \
            --arg head_label "${HEAD_LABEL}" \
            '{
              pr_number: $pr_number,
              event_name: "pull_request_review_comment",
              event: {
                comment: {
                  id: $review_comment_id,
                  path: $file_path,
                  user: { login: $commenter_login }
                },
                pull_request: {
                  user: { login: $pr_author_login },
                  base: {
                    repo: { full_name: $base_repo }
                  },
                  head: {
                    repo: { full_name: $head_repo },
                    sha: $head_sha,
                    ref: $head_ref,
                    label: $head_label
                  }
                }
              }
            }')"

          {
            echo "json<<EOF"
            echo "${meta_json}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Emit synthetic bridge artifact
        uses: leanprover-community/privilege-escalation-bridge/emit@v1
        with:
          artifact: workflow-data-${{ matrix.case.name }}
          outputs_file: bridge-outputs.json
          meta: ${{ steps.meta.outputs.json }}
          include_event: none
          retention_days: 1

      - name: Run splice-wf-run dry run
        id: run_action
        continue-on-error: true
        uses: ./.github/actions/splice-wf-run
        with:
          source_workflow: ${{ github.workflow }}
          bridge_run_id: ${{ github.run_id }}
          bridge_artifact: workflow-data-${{ matrix.case.name }}
          allow_pr_author: ${{ matrix.case.allow_pr_author }}
          min_repo_permission: ${{ matrix.case.min_repo_permission }}
          allowed_users: ${{ matrix.case.allowed_users }}
          push_to_fork: ${{ matrix.case.push_to_fork }}
          dry_run: 'true'

      - name: Assert expected outcome
        shell: bash
        env:
          ACTUAL_OUTCOME: ${{ steps.run_action.outcome }}
          EXPECTED_OUTCOME: ${{ matrix.case.expected_outcome }}
          CASE_NAME: ${{ matrix.case.name }}
        run: |
          set -euo pipefail

          if [ "${ACTUAL_OUTCOME}" != "${EXPECTED_OUTCOME}" ]; then
            echo "Unexpected outcome for ${CASE_NAME}: expected ${EXPECTED_OUTCOME}, got ${ACTUAL_OUTCOME}"
            exit 1
          fi

          echo "Case ${CASE_NAME} completed with expected outcome ${EXPECTED_OUTCOME}"
